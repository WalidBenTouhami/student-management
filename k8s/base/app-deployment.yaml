apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-management
  namespace: student-management
  labels:
    app.kubernetes.io/name: student-management
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: student-management
  template:
    metadata:
      labels:
        app.kubernetes.io/name: student-management
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/student/actuator/prometheus"
        prometheus.io/port: "8089"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 60
      containers:
        - name: student-management
          image: walid369/student-management:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8089
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: student-management-config
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: student-management-mysql-secret
                  key: app-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: student-management-mysql-secret
                  key: app-password
            - name: ACTUATOR_USER
              valueFrom:
                secretKeyRef:
                  name: student-management-app-secret
                  key: actuator-user
            - name: ACTUATOR_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: student-management-app-secret
                  key: actuator-password
            - name: API_USER
              valueFrom:
                secretKeyRef:
                  name: student-management-app-secret
                  key: api-user
            - name: API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: student-management-app-secret
                  key: api-password
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /student/actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /student/actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            httpGet:
              path: /student/actuator/health/liveness
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
          volumeMounts:
            - name: tmp-dir
              mountPath: /tmp
      volumes:
        - name: tmp-dir
          emptyDir: {}

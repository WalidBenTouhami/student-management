apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: student-management-monitor
  namespace: student-management
  labels:
    app.kubernetes.io/name: student-management
    # This label must match the Prometheus Operator's serviceMonitorSelector
    release: prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: student-management
  endpoints:
    - port: http
      path: /student/actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s

# ============================================================
# 📉 PROMETHEUS CONFIGURATION
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
# - "alerts.yml"

scrape_configs:
  # ============================================================
  # JENKINS
  # ============================================================
  - job_name: 'jenkins'
    metrics_path: '/prometheus'
    static_configs:
      - targets: ['192.168.56.10:8080']

  # ============================================================
  # SPRING BOOT APP
  # ============================================================
  - job_name: 'spring-app'
    metrics_path: '/student/actuator/prometheus'
    basic_auth:
      username: '${APP_SECURITY_USERNAME}'
      password: '${APP_SECURITY_PASSWORD}'
    static_configs:
      - targets: ['spring-app:8089']

  # ============================================================
  # NODE EXPORTER (Système)
  # ============================================================
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # ============================================================
  # MYSQL
  # ============================================================
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysqld-exporter:9104']

  # ============================================================
  # SONARQUBE
  # ============================================================
  - job_name: 'sonarqube'
    metrics_path: '/api/monitoring/metrics'
    static_configs:
      - targets: ['sonarqube:9000']

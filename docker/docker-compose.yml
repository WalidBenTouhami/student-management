# ============================================================
# 🐳 DOCKER COMPOSE - STUDENT MANAGEMENT
# ============================================================

services:
  # ============================================================
  # 🐬 MYSQL - Base de Données
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: student-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-studentdb}
      MYSQL_USER: ${MYSQL_USER:-spring}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-spring123}
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # 🚀 SPRING BOOT - Application
  # ============================================================
  spring-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: student-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${ENVIRONMENT:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-studentdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-spring}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-spring123}
      JWT_SECRET: ${JWT_SECRET:-defaultSecretKey}
      MAIL_HOST: ${MAIL_HOST:-smtp.office365.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-devops@esprit.tn}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-change_me}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      APP_SECURITY_USERNAME: ${APP_SECURITY_USERNAME:-dev-admin}
      APP_SECURITY_PASSWORD: ${APP_SECURITY_PASSWORD:-dev-only-change-me}
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - devops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/student/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================
  # 📊 SONARQUBE - Qualité de Code
  # ============================================================
  sonarqube:
    image: sonarqube:lts-community
    container_name: student-sonarqube
    restart: unless-stopped
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
      - "9092:9092"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - devops-network
    depends_on:
      - sonarqube-db

  # ============================================================
  # 🐘 SONARQUBE DATABASE
  # ============================================================
  sonarqube-db:
    image: postgres:15
    container_name: student-sonar-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar_db:/var/lib/postgresql/data
    networks:
      - devops-network

  # ============================================================
  # 📉 PROMETHEUS - Supervision
  # ============================================================
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: student-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - devops-network
    depends_on:
      - spring-app
      - mysqld-exporter
      - node-exporter

  mysqld-exporter:
    image: prom/mysqld-exporter:v0.14.0
    container_name: student-mysql-exporter
    environment:
      DATA_SOURCE_NAME: "${MYSQL_USER:-spring}:${MYSQL_PASSWORD:-spring123}@(mysql:3306)/"
    networks:
      - devops-network
    depends_on:
      mysql:
        condition: service_healthy

  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: student-node-exporter
    restart: unless-stopped
    networks:
      - devops-network

  # ============================================================
  # 📈 GRAFANA - Visualisation
  # ============================================================
  grafana:
    image: grafana/grafana:11.5.0
    container_name: student-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - devops-network
    depends_on:
      - prometheus

# ============================================================
# 🔗 VOLUMES PERSISTANTS
# ============================================================
volumes:
  mysql_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local
  sonar_db:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================================
# 🌐 RÉSEAU
# ============================================================
networks:
  devops-network:
    driver: bridge
    name: devops-network

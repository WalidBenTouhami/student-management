services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-studentdb}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - app-network
    restart: unless-stopped

  student-management:
    build: .
    container_name: student-management
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-studentdb}?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secret}
      ACTUATOR_USER: ${ACTUATOR_USER:-actuator}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD:-changeme}
      API_USER: ${API_USER:-api}
      API_PASSWORD: ${API_PASSWORD:-changeme}
      API_SECURITY_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      SERVER_PORT: 8089
    ports:
      - "8089:8089"
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

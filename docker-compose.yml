version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-studentdb}
      MYSQL_USER: ${MYSQL_USER:-student_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-student_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "student_user", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --ssl-mode=REQUIRED
    mem_limit: 512m
    cpus: 0.5
    networks:
      - app-network

  student-management:
    image: walid369/student-management:latest
    container_name: student-management
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/studentdb?useSSL=true&requireSSL=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-student_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-student_pass}
      ACTUATOR_USER: ${ACTUATOR_USER:-admin}
      ACTUATOR_PASSWORD: ${ACTUATOR_PASSWORD:-changeme}
      API_USER: ${API_USER:-api-user}
      API_PASSWORD: ${API_PASSWORD:-changeme}
      API_SECURITY_ENABLED: ${API_SECURITY_ENABLED:-true}
      SERVER_PORT: 8089
    ports:
      - "8089:8089"
    depends_on:
      mysql:
        condition: service_healthy
    mem_limit: 512m
    cpus: 0.5
    networks:
      - app-network

volumes:
  mysql-data:

networks:
  app-network:
    driver: bridge
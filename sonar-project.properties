# SonarQube Project Configuration
# ─────────────────────────────────────────────────────────────────────────────
# These properties are merged with those in pom.xml <properties>.
# pom.xml takes precedence for sonar.projectKey, sonar.projectName, etc.
# ─────────────────────────────────────────────────────────────────────────────

sonar.projectKey=student-management
sonar.projectName=Student Management System
sonar.projectVersion=1.0

# Source & test directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Code coverage — JaCoCo XML report
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.java.coveragePlugin=jacoco

# ─────────────────────────────────────────────────────────────────────────────
# Exclusions — generated code, Flyway migrations, config classes
# ─────────────────────────────────────────────────────────────────────────────
sonar.exclusions=\
  **/generated/**,\
  **/db/migration/**,\
  **/*MapperImpl.java,\
  **/target/**

sonar.coverage.exclusions=\
  **/*Application.java,\
  **/*Config*.java,\
  **/*Configuration.java,\
  **/*Exception*.java,\
  **/*DTO*.java,\
  **/*Request*.java,\
  **/*Response*.java,\
  **/*Mapper.java

# ─────────────────────────────────────────────────────────────────────────────
# Quality Gate thresholds (enforced via waitForQualityGate in Jenkins)
# Minimum targets:
#   - Bugs              : 0 new bugs
#   - Vulnerabilities   : 0 new vulnerabilities
#   - Code Smells       : ≤ 5 new code smells
#   - Coverage          : ≥ 70% on new code
#   - Duplication       : ≤ 3% on new code
# ─────────────────────────────────────────────────────────────────────────────
sonar.qualitygate.wait=true

# Encoding
sonar.sourceEncoding=UTF-8

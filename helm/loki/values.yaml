loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: 'filesystem'
singleBinary:
  replicas: 1

promtail:
  enabled: true
  config:
    snippets:
      pipelineStages:
        - docker: {}
        - match:
            selector: '{app_kubernetes_io_name="student-management"}'
            stages:
              - json:
                  expressions:
                    level: "log.level"
                    logger: "log.logger"
                    message: "message"
                    timestamp: "@timestamp"
              - labels:
                  level:
              - output:
                  source: message

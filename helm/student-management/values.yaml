# ============================================================
# 📦 values.yaml — Configuration centralisée du Helm Chart
# Modifiez ici pour adapter l'environnement sans toucher aux templates
# ============================================================

# ── Namespace ──────────────────────────────────────────────
namespace: devops-tools

# ── Image Spring App ───────────────────────────────────────
image:
  repository: esprit/student-management
  tag: "1.0.0"
  pullPolicy: IfNotPresent

# ── Application Spring Boot ────────────────────────────────
app:
  port: 8089
  contextPath: /student
  replicas: 2
  corsAllowedOrigins: "http://localhost:4200"
  security:
    username: api-user
    password: ""
  livenessProbe:
    httpGet:
      path: /student/actuator/health
      port: 8089
    initialDelaySeconds: 40
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /student/actuator/health
      port: 8089
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "500m"
  nodePort: 30089

# ── MySQL ──────────────────────────────────────────────────
mysql:
  image: mysql:8.0.42
  database: studentdb
  username: spring
  password: "" # Set via Jenkins or external secret
  rootPassword: "" # Set via Jenkins or external secret
  port: 3306
  storage: 1Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  exporter:
    image: prom/mysqld-exporter:v0.14.0
    port: 9104

# ── Prometheus ─────────────────────────────────────────────
prometheus:
  image: prom/prometheus:v3.5.0
  port: 9090
  nodePort: 30090
  scrapeInterval: 15s
  evaluationInterval: 15s
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

# ── Grafana ────────────────────────────────────────────────
grafana:
  image: grafana/grafana:11.5.0
  port: 3000
  nodePort: 30300
  adminUser: admin
  adminPassword: "" # Set via Jenkins or external secret
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

# ── Hosts Ingress ──────────────────────────────────────────
ingress:
  className: nginx
  apiHost: api.student.local
  grafanaHost: grafana.student.local

monitoring:
  cadvisor:
    enabled: false

# ── Hôtes externes (Jenkins, SonarQube, VM) ────────────────
external:
  vmHost: "192.168.56.10"
  jenkinsPort: "8080"
  sonarPort: "9000"
  jenkinsMetricsToken: ""
  sonarToken: ""
  sonarAdminPassword: "" # Set via Jenkins or external secret

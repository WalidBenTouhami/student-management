# ─────────────────────────────────────────────────────────────────────────────
# MySQL Secret — DO NOT commit real values
# In Jenkins pipeline, values are injected via --set from Jenkins Credentials:
#   helm upgrade --install ... \
#     --set mysqlSecret.rootPassword=$(echo -n "$MYSQL_ROOT_PASSWORD" | base64) \
#     --set mysqlSecret.appUser=$(echo -n "$MYSQL_APP_USER" | base64) \
#     --set mysqlSecret.appPassword=$(echo -n "$MYSQL_APP_PASSWORD" | base64)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "student-management.mysqlSecretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "student-management.labels" . | nindent 4 }}
type: Opaque
data:
  root-password: {{ .Values.mysqlSecret.rootPassword | b64enc | quote }}
  app-user: {{ .Values.mysqlSecret.appUser | b64enc | quote }}
  app-password: {{ .Values.mysqlSecret.appPassword | b64enc | quote }}
---
# ─────────────────────────────────────────────────────────────────────────────
# Application Secret (Actuator + API credentials)
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "student-management.appSecretName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "student-management.labels" . | nindent 4 }}
type: Opaque
data:
  actuator-user: {{ .Values.appSecret.actuatorUser | b64enc | quote }}
  actuator-password: {{ .Values.appSecret.actuatorPassword | b64enc | quote }}
  api-user: {{ .Values.appSecret.apiUser | b64enc | quote }}
  api-password: {{ .Values.appSecret.apiPassword | b64enc | quote }}

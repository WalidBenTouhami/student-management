apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}

    scrape_configs:
      # ============================================================
      # SPRING BOOT APP (Sur K8s) ✅ UP
      # ============================================================
      - job_name: 'spring-app'
        metrics_path: '{{ .Values.app.contextPath }}/actuator/prometheus'
        basic_auth:
          username: {{ .Values.app.security.username | quote }}
          password_file: /etc/prometheus/secrets/app-password
        static_configs:
          - targets: ['spring-service:{{ .Values.app.port }}']

      # ============================================================
      # MYSQL ✅ UP
      # ============================================================
      - job_name: 'mysql'
        static_configs:
          - targets: ['mysql-service:{{ .Values.mysql.exporter.port }}']

      {{ if .Values.monitoring.cadvisor.enabled }}
      - job_name: 'cadvisor'
        static_configs:
          - targets: ['cadvisor:8080']
      {{ end }}

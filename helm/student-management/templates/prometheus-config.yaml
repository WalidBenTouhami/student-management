apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}

    scrape_configs:
      # ============================================================
      # JENKINS
      # ============================================================
      - job_name: 'jenkins'
        metrics_path: '/prometheus/'
        basic_auth:
          username: 'prometheus-token'
          password: '{{ .Values.external.jenkinsMetricsToken }}'
        static_configs:
          - targets: ['{{ .Values.external.vmHost }}:{{ .Values.external.jenkinsPort }}']

      # ============================================================
      # SPRING BOOT APP (Sur K8s)
      # ============================================================
      - job_name: 'spring-app'
        metrics_path: '{{ .Values.app.contextPath }}/actuator/prometheus'
        static_configs:
          - targets: ['spring-service:{{ .Values.app.port }}']

      # ============================================================
      # MYSQL
      # ============================================================
      - job_name: 'mysql'
        static_configs:
          - targets: ['mysql-service:{{ .Values.mysql.exporter.port }}']

      # ============================================================
      # CADVISOR (Containers)
      # ============================================================
      - job_name: 'cadvisor'
        static_configs:
          - targets: ['cadvisor:8080']

      # ============================================================
      # SONARQUBE
      # ============================================================
      - job_name: 'sonarqube'
        metrics_path: '/api/monitoring/metrics'
        basic_auth:
          username: '{{ .Values.external.sonarToken }}'
          password: ''
        static_configs:
          - targets: ['{{ .Values.external.vmHost }}:{{ .Values.external.sonarPort }}']

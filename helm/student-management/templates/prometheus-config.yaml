apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: {{ .Values.namespace }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.prometheus.scrapeInterval }}
      evaluation_interval: {{ .Values.prometheus.evaluationInterval }}

    scrape_configs:
      # ============================================================
      # SPRING BOOT APP (Sur K8s) ✅ UP
      # ============================================================
      - job_name: 'spring-app'
        metrics_path: '{{ .Values.app.contextPath }}/actuator/prometheus'
        static_configs:
          - targets: ['spring-service:{{ .Values.app.port }}']

      # ============================================================
      # MYSQL ✅ UP
      # ============================================================
      - job_name: 'mysql'
        static_configs:
          - targets: ['mysql-service:{{ .Values.mysql.exporter.port }}']

      # ============================================================
      # CADVISOR ✅ UP
      # ============================================================
      - job_name: 'cadvisor'
        static_configs:
          - targets: ['cadvisor:8080']

      # ============================================================
      # SONARQUBE ✅ Réactivé — admin:0000
      # ============================================================
      - job_name: 'sonarqube'
        metrics_path: '/api/monitoring/metrics'
        basic_auth:
          username: 'admin'
          password: '{{ .Values.external.sonarAdminPassword }}'
        static_configs:
          - targets: ['{{ .Values.external.vmHost }}:{{ .Values.external.sonarPort }}']

      # ============================================================
      # JENKINS ❌ DÉSACTIVÉ — Plugin "Prometheus Metrics" non installé
      # ACTION REQUISE : Jenkins > Manage Plugins > "Prometheus Metrics" > Install
      # Puis décommenter ce bloc et relancer helm upgrade
      # ============================================================
      # - job_name: 'jenkins'
      #   metrics_path: '/prometheus'
      #   basic_auth:
      #     username: 'admin'
      #     password: '{{ .Values.external.jenkinsMetricsToken }}'
      #   static_configs:
      #     - targets: ['{{ .Values.external.vmHost }}:{{ .Values.external.jenkinsPort }}']

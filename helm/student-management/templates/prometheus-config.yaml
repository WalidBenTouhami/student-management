apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: devops-tools
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # ============================================================
      # JENKINS
      # ============================================================
      - job_name: 'jenkins'
        metrics_path: '/prometheus/'
        basic_auth:
          username: 'prometheus-token'
          password: 'JENKINS_TOKEN_PLACEHOLDER'
        static_configs:
          - targets: ['192.168.56.10:8080']

      # ============================================================
      # SPRING BOOT APP (Sur K8s)
      # ============================================================
      - job_name: 'spring-app'
        metrics_path: '/student/actuator/prometheus'
        static_configs:
          - targets: ['spring-service:8089']

      # ============================================================
      # MYSQL
      # ============================================================
      - job_name: 'mysql'
        static_configs:
          - targets: ['mysql-service:9104']

      # ============================================================
      # CADVISOR (Containers)
      # ============================================================
      - job_name: 'cadvisor'
        static_configs:
          - targets: ['cadvisor:8080']

      # ============================================================
      # SONARQUBE
      # ============================================================
      - job_name: 'sonarqube'
        metrics_path: '/api/monitoring/metrics'
        basic_auth:
          username: '11fd280a42943b4f20184833083de7e3c8'
          password: ''
        static_configs:
          - targets: ['192.168.56.10:9000']

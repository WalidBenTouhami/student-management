{{- if .Values.networkPolicy.enabled }}
# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicy for the Spring Boot application
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "student-management.fullname" . }}-netpol
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "student-management.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "student-management.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow HTTP traffic on the application port from any pod in the namespace
    - ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
  egress:
    # Allow DNS resolution (CoreDNS)
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to MySQL service
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: mysql
      ports:
        - protocol: TCP
          port: {{ .Values.mysql.port }}
---
# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicy for MySQL
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "student-management.fullname" . }}-mysql-netpol
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "student-management.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mysql
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Only allow connections from the application pods
    - from:
        - podSelector:
            matchLabels:
              {{- include "student-management.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.mysql.port }}
  egress:
    # Allow DNS only
    - ports:
        - protocol: UDP
          port: 53
{{- end }}

# ============================================================
# ☸️ KUBERNETES SERVICE - MYSQL
# ============================================================

apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: devops-tools
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
    - port: 9104
      targetPort: 9104
      name: metrics
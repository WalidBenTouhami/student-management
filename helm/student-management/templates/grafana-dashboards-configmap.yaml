apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-custom
  namespace: {{ .Values.namespace }}
data:
  code-coverage.json: |-
    {
      "id": null,
      "uid": "student-coverage-dashboard",
      "title": "Student Management - Code Coverage",
      "tags": ["spring-boot", "devops", "coverage"],
      "timezone": "browser",
      "editable": true,
      "hideControls": false,
      "graphTooltip": 0,
      "panels": [
        {
          "type": "stat",
          "title": "Code Coverage Global",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "student_management_coverage_percent",
              "legendFormat": "Coverage",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "#EAB839", "value": 60 },
                  { "color": "green", "value": 80 }
                ]
              },
              "unit": "percent"
            }
          }
        },
        {
          "type": "gauge",
          "title": "Taux de Couverture",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "student_management_coverage_percent",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "min": 0,
              "max": 100,
              "color": {
                "mode": "thresholds"
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "orange", "value": 50 },
                  { "color": "yellow", "value": 70 },
                  { "color": "green", "value": 85 }
                ]
              }
            }
          }
        },
        {
          "type": "timeseries",
          "title": "Évolution de la Couverture",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "student_management_coverage_percent",
              "legendFormat": "Coverage %"
            }
          ],
          "options": {
            "legend": { "displayMode": "list" },
            "tooltip": { "mode": "multi" }
          }
        }
      ],
      "schemaVersion": 38,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-24h",
        "to": "now"
      }
    }

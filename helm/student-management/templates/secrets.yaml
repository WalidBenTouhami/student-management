apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: {{ .Values.mysql.username | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ .Values.mysql.password | quote }}
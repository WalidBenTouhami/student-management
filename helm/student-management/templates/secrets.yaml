# ============================================================
# ☸️ KUBERNETES SECRETS
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: {{ .Values.mysql.username | quote }}
  SPRING_DATASOURCE_PASSWORD: {{ required "mysql.password must be provided" .Values.mysql.password | quote }}
  MYSQL_ROOT_PASSWORD: {{ required "mysql.rootPassword must be provided" .Values.mysql.rootPassword | quote }}
  GRAFANA_ADMIN_USER: {{ .Values.grafana.adminUser | quote }}
  GRAFANA_ADMIN_PASSWORD: {{ required "grafana.adminPassword must be provided" .Values.grafana.adminPassword | quote }}
  APP_SECURITY_USERNAME: {{ .Values.app.security.username | quote }}
  APP_SECURITY_PASSWORD: {{ required "app.security.password must be provided" .Values.app.security.password | quote }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "student-management.configMapName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "student-management.labels" . | nindent 4 }}
data:
  # Non-sensitive Spring Boot configuration
  SPRING_PROFILES_ACTIVE: {{ .Values.app.springProfiles | quote }}
  SERVER_PORT: {{ .Values.app.port | quote }}
  CONTEXT_PATH: {{ .Values.app.contextPath | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.app.corsAllowedOrigins | quote }}
  API_SECURITY_ENABLED: {{ .Values.app.apiSecurityEnabled | quote }}
  MYSQL_DATABASE: {{ .Values.mysql.database | quote }}
  SPRING_DATASOURCE_URL: {{ printf "jdbc:mysql://mysql-service:%d/%s?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC" (int .Values.mysql.port) .Values.mysql.database | quote }}

---
# MySQL Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "student-management.mysqlLabels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate    # MySQL requires Recreate (single-writer)
  selector:
    matchLabels:
      {{- include "student-management.mysqlSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "student-management.mysqlSelectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsUser: 999    # mysql user in official image
        fsGroup: 999
      containers:
        - name: mysql
          image: {{ .Values.mysql.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: {{ .Values.mysql.port }}
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "student-management.mysqlSecretName" . }}
                  key: root-password
            - name: MYSQL_DATABASE
              value: {{ .Values.mysql.database }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "student-management.mysqlSecretName" . }}
                  key: app-user
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "student-management.mysqlSecretName" . }}
                  key: app-password
          resources:
            {{- toYaml .Values.mysql.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          {{- if .Values.mysql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: mysql-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
---
# MySQL Service (ClusterIP — internal only)
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "student-management.mysqlLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "student-management.mysqlSelectorLabels" . | nindent 4 }}
  ports:
    - name: mysql
      protocol: TCP
      port: {{ .Values.mysql.port }}
      targetPort: mysql

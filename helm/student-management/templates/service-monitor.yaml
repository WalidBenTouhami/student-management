apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: student-management-coverage
  labels:
    {{- include "student-management.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "student-management.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: http
    path: /student/actuator/prometheus
    interval: 15s
    scrapeTimeout: 10s

name: Java 25 CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Verify application
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Validate Docker Compose
        run: docker compose -f docker/docker-compose.yml config --quiet

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Lint Helm chart
        run: >-
          helm lint helm/student-management
          --set-string mysql.password=test-password
          --set-string mysql.rootPassword=test-root-password
          --set-string grafana.adminPassword=test-password

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/
            target/site/jacoco/
          if-no-files-found: warn

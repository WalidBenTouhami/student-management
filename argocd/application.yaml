apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-management-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/NadineMili/student-management-devops'
    targetRevision: HEAD
    path: k8s/overlays/dev
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: student-management
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

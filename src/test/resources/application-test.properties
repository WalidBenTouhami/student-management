spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
api.security.enabled=false
# Disable Flyway in tests (H2 uses ddl-auto instead)
spring.flyway.enabled=false
# Disable structured logging in tests (not needed, avoids format validation)
logging.structured.format.console=

# Allow bean overriding (critical for dependency configuration compatibility)
spring.main.allow-bean-definition-overriding=true
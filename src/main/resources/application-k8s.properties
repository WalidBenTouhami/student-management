# ─────────────────────────────────────────────────────────────────────────────
# Kubernetes Profile — applied when SPRING_PROFILES_ACTIVE=k8s
# Inherits from application.properties, overrides K8s-specific settings
# ─────────────────────────────────────────────────────────────────────────────

# Flyway manages schema in Kubernetes (never let Hibernate alter schema)
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Disable Swagger UI in production K8s deployments
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Actuator — keep metrics for Prometheus scraping, restrict health details
management.endpoint.health.show-details=when_authorized
management.endpoint.health.show-components=when_authorized

# JSON logging forced (cloud-native log aggregation)
logging.structured.format.console=json
logging.level.root=WARN
logging.level.tn.esprit.studentmanagement=INFO

# Datasource connection pool — tuned for K8s (limited resources)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-test-query=SELECT 1

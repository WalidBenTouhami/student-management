# Production profile
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway manages schema in production
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Datasource must be provided via environment variables:
#   SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD

# Actuator credentials must be set via ACTUATOR_USER / ACTUATOR_PASSWORD
# API credentials via API_USER / API_PASSWORD when api security is enabled

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.security.api-enabled=${API_SECURITY_ENABLED:true}

springdoc.swagger-ui.enabled=false

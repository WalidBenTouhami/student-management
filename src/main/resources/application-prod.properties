# =====================================================
# Profil de production
# =====================================================

# Connexion MySQL avec le paramètre obligatoire pour MySQL 8.0
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:3306/${DB_NAME:student_db}?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}

# Désactiver DDL auto en production (Flyway gère le schéma)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway migrations
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# CORS (optionnel)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
app.security.api-enabled=${API_SECURITY_ENABLED:true}

# Désactiver Swagger en production
springdoc.swagger-ui.enabled=false
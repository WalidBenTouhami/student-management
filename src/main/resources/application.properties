spring.application.name=student-management
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/studentdb?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Use Flyway to manage schema migrations in production
spring.flyway.enabled=false

# Enable Flyway in production profile by creating `application-prod.properties` with
# `spring.flyway.enabled=true` and desired flyway settings.

# Server configuration :
server.port=${SERVER_PORT:8089}
server.servlet.context-path=${SERVER_SERVLET_CONTEXT_PATH:/student}

# Actuator settings - expose health and info endpoints over HTTP
management.endpoints.web.exposure.include=health,info
# Enable health probes (useful for container orchestrators)
management.endpoint.health.probes.enabled=true
# Do not show detailed health info to unauthenticated requests in prod
management.endpoint.health.show-details=never
# ─────────────────────────────────────────────────────────────────────────────
# SERVER
# ─────────────────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8089}
server.servlet.context-path=${CONTEXT_PATH:/student}

# ─────────────────────────────────────────────────────────────────────────────
# DATABASE (credentials injected via env / Kubernetes Secrets)
# ─────────────────────────────────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/studentdb?useSSL=true&requireSSL=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:student_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─────────────────────────────────────────────────────────────────────────────
# JPA
# ─────────────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─────────────────────────────────────────────────────────────────────────────
# ACTUATOR — expose health, info, prometheus (metrics)
# ─────────────────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
# Prometheus metrics path
management.endpoints.web.base-path=/actuator
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name:student-management}

# ─────────────────────────────────────────────────────────────────────────────
# SECURITY — Actuator & API credentials
# ─────────────────────────────────────────────────────────────────────────────
actuator.username=${ACTUATOR_USER:admin}
actuator.password=${ACTUATOR_PASSWORD:changeme}
api.username=${API_USER:api-user}
api.password=${API_PASSWORD:changeme}
api.security.enabled=${API_SECURITY_ENABLED:true}

# ─────────────────────────────────────────────────────────────────────────────
# CORS
# ─────────────────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# ─────────────────────────────────────────────────────────────────────────────
# LOGGING — Structured JSON (parsed by Prometheus/Loki/ELK)
# ─────────────────────────────────────────────────────────────────────────────
logging.level.tn.esprit.studentmanagement=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
# JSON structured logging (Spring Boot 3.4+)
logging.structured.format.console=json
# SERVEUR
server.port=${SERVER_PORT:8089}
server.servlet.context-path=${CONTEXT_PATH:/student}

# DATABASE (PROD via env)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/studentdb?useSSL=true&requireSSL=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:student_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:changeme}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA - validate (ne modifie pas le schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ACTUATOR & API SECURITY
actuator.username=${ACTUATOR_USER:admin}
actuator.password=${ACTUATOR_PASSWORD:changeme}
api.username=${API_USER:api-user}
api.password=${API_PASSWORD:changeme}
api.security.enabled=${API_SECURITY_ENABLED:true}

# CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# LOGGING
logging.level.tn.esprit.studentmanagement=DEBUG
logging.level.org.springframework.web=INFO